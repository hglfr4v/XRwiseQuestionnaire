  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

stify-content:space-between; align-items:flex-start; margin-bottom:48px;\">\n        <img src=\"3eb3c279-a39d-4525-b25f-ab899864c9d5\" alt=\"XRwise\" style=\"height:46px; width:auto; display:block;\">\n        <div style=\"font-family:'Saira',sans-serif; font-weight:600; font-size:15px; letter-spacing:3px; color:#A4A4AC; text-transform:uppercase; text-align:right; padding-top:8px;\"><br><span style=\"color:#E6007E;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Saira',sans-serif; font-weight:600; font-size:15px; letter-spacing:4px; color:#E6007E; text-transform:uppercase; margin-bottom:18px;\">Participant Questionnaire<\u002Fdiv>\n      <h1 style=\"font-family:'Saira',sans-serif; font-weight:800; font-size:52px; line-height:1.02; letter-spacing:-1.5px; color:#0F0F12; margin:0;\">XRwise experience<\u002Fh1>\n      <p style=\"font-size:19px; line-height:1.5; font-weight:300; color:#6B6B73; margin:18px 0 0 0; max-width:640px;\">Thank you for taking part. Tell us about your experience with our XRwise platform. It takes about three minutes.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"height:1px; background:#E6E6EA; margin:48px 80px 0 80px;\"><\u002Fdiv>\n\n    <!-- ░░ SECTION 1 — CONSENT ░░ -->\n    <div style=\"padding:48px 72px 0 80px;\">\n      <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:24px;\">\n        <span style=\"font-family:'Saira',sans-serif; font-weight:800; font-size:24px; color:#E6007E;\">01<\u002Fspan>\n        <h2 style=\"font-family:'Saira',sans-serif; font-weight:700; font-size:30px; letter-spacing:-0.5px; color:#0F0F12; margin:0; flex:1 1 auto;\">Consent<\u002Fh2>\n      <\u002Fdiv>\n\n      <p style=\"font-size:18px; line-height:1.55; font-weight:400; color:#2A2A30; margin:0 0 18px 0; max-width:680px;\">Your responses are collected and stored <strong style=\"font-weight:500; color:#0F0F12;\">anonymously<\u002Fstrong> — they are never linked to your name or identity. We need your consent to use them for research purposes. Do you agree to take part and to the processing of your anonymized responses?<\u002Fp>\n      <div>{{ consentButtons }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height:1px; background:#E6E6EA; margin:48px 80px 0 80px;\"><\u002Fdiv>\n\n    <!-- ░░ SECTION 2 — ABOUT YOU ░░ -->\n    <div style=\"padding:48px 72px 0 80px;\">\n      <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:36px;\">\n        <span style=\"font-family:'Saira',sans-serif; font-weight:800; font-size:24px; color:#E6007E;\">02<\u002Fspan>\n        <h2 style=\"font-family:'Saira',sans-serif; font-weight:700; font-size:30px; letter-spacing:-0.5px; color:#0F0F12; margin:0; flex:1 1 auto;\">About you<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px 36px;\">\n        <div>\n          <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin-bottom:10px;\">Participant ID<\u002Flabel>\n          <input type=\"text\" value=\"{{ idVal }}\" onchange=\"{{ onId }}\" placeholder=\"e.g. P-014\" style=\"width:100%; font-family:'Roboto',sans-serif; font-size:18px; color:#0F0F12; padding:14px 16px; border:1.5px solid #E0E0E6; background:#FAFAFB; transition:border-color .15s;\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin-bottom:10px;\">Age<\u002Flabel>\n          <input type=\"number\" min=\"0\" value=\"{{ ageVal }}\" onchange=\"{{ onAge }}\" placeholder=\"e.g. 24\" style=\"width:100%; font-family:'Roboto',sans-serif; font-size:18px; color:#0F0F12; padding:14px 16px; border:1.5px solid #E0E0E6; background:#FAFAFB; transition:border-color .15s;\">\n        <\u002Fdiv>\n        <div style=\"grid-column:1 / -1;\">\n          <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin-bottom:10px;\">Job / Role<\u002Flabel>\n          <input type=\"text\" value=\"{{ jobVal }}\" onchange=\"{{ onJob }}\" placeholder=\"e.g. Student, Teacher, Engineer\" style=\"width:100%; font-family:'Roboto',sans-serif; font-size:18px; color:#0F0F12; padding:14px 16px; border:1.5px solid #E0E0E6; background:#FAFAFB; transition:border-color .15s;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin:28px 0 14px 0;\">Where are you joining from?<\u002Flabel>\n      <div>{{ locationButtons }}<\u002Fdiv>\n\n      <sc-if value=\"{{ isOnline }}\" hint-placeholder-val=\"{{ false }}\">\n        <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin:28px 0 14px 0;\">Which software are you using to join?<\u002Flabel>\n        <div>{{ softwareButtons }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"height:1px; background:#E6E6EA; margin:48px 80px 0 80px;\"><\u002Fdiv>\n\n    <!-- ░░ SECTION 2 — BACKGROUND ░░ -->\n    <div style=\"padding:48px 72px 0 80px;\">\n      <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:36px;\">\n        <span style=\"font-family:'Saira',sans-serif; font-weight:800; font-size:24px; color:#E6007E;\">03<\u002Fspan>\n        <h2 style=\"font-family:'Saira',sans-serif; font-weight:700; font-size:30px; letter-spacing:-0.5px; color:#0F0F12; margin:0; flex:1 1 auto;\">Your background<\u002Fh2>\n      <\u002Fdiv>\n\n      <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin-bottom:14px;\">Previous XR experience<\u002Flabel>\n      <div style=\"margin-bottom:40px;\">{{ xrButtons }}<\u002Fdiv>\n\n      <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin-bottom:6px;\">Affinity with technology<\u002Flabel>\n      <p style=\"font-size:15px; font-weight:300; color:#A4A4AC; margin:0 0 14px 0;\">1 = not at all comfortable · 7 = very comfortable<\u002Fp>\n      <div>{{ affinityButtons }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height:1px; background:#E6E6EA; margin:48px 80px 0 80px;\"><\u002Fdiv>\n\n    <!-- ░░ SECTION 3 — THE EXPERIENCE ░░ -->\n    <div style=\"padding:48px 72px 0 80px;\">\n      <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n        <span style=\"font-family:'Saira',sans-serif; font-weight:800; font-size:24px; color:#E6007E;\">04<\u002Fspan>\n        <h2 style=\"font-family:'Saira',sans-serif; font-weight:700; font-size:30px; letter-spacing:-0.5px; color:#0F0F12; margin:0; flex:1 1 auto;\">The experience<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:16px; font-weight:300; color:#6B6B73; margin:0 0 8px 0;\">How much do you agree with each statement? <span style=\"color:#A4A4AC;\">1 = strongly disagree · 7 = strongly agree<\u002Fspan><\u002Fp>\n\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">The experience felt immersive and realistic<\u002Fspan>\n          <div style=\"flex:none;\">{{ row1 }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">It was easy to use and navigate<\u002Fspan>\n          <div style=\"flex:none;\">{{ row2 }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">The interaction with the controller felt intuitive<\u002Fspan>\n          <div style=\"flex:none;\">{{ row3 }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">The streaming was smooth and clear, without lag<\u002Fspan>\n          <div style=\"flex:none;\">{{ row4 }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">I felt more engaged than with traditional methods<\u002Fspan>\n          <div style=\"flex:none;\">{{ row5 }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:24px; padding:22px 0; border-bottom:1px solid #EFEFF2;\">\n          <span style=\"font-size:19px; font-weight:400; color:#2A2A30; flex:1;\">I would like to learn with this tool<\u002Fspan>\n          <div style=\"flex:none;\">{{ row6 }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <label style=\"display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#6B6B73; margin:36px 0 12px 0;\">Anything else you'd like to share?<\u002Flabel>\n      <textarea value=\"{{ commentVal }}\" onchange=\"{{ onComment }}\" rows=\"4\" placeholder=\"Optional — what stood out, what could be better…\" style=\"width:100%; font-family:'Roboto',sans-serif; font-size:18px; line-height:1.5; color:#0F0F12; padding:16px; border:1.5px solid #E0E0E6; background:#FAFAFB; resize:vertical; transition:border-color .15s;\"><\u002Ftextarea>\n    <\u002Fdiv>\n\n    <!-- Footer / actions -->\n    <div style=\"margin-top:48px; padding:36px 72px 40px 80px; background:#0F0F12; display:flex; justify-content:space-between; align-items:center; gap:24px; flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'Saira',sans-serif; font-weight:600; font-size:20px; color:#FFFFFF;\">{{ statusTitle }}<\u002Fdiv>\n        <div style=\"font-size:15px; font-weight:300; color:#A4A4AC; margin-top:4px;\">Your response downloads as a CSV file you can keep or send back.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>{{ downloadButton }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-family:'Saira',sans-serif; font-size:13px; letter-spacing:2px; color:#A4A4AC; text-transform:uppercase; margin-top:32px;\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    consent: '',\n    id: '', age: '', job: '',\n    location: '', software: '',\n    prevXR: '', techAffinity: 0,\n    q1: 0, q2: 0, q3: 0, q4: 0, q5: 0, q6: 0,\n    comment: ''\n  };\n\n  set(k, v) { this.setState({ [k]: v }); }\n\n  pillStyle(active) {\n    return {\n      fontFamily: \"'Roboto',sans-serif\", fontSize: '16px', fontWeight: active ? 500 : 400,\n      padding: '12px 22px', cursor: 'pointer', transition: 'all .12s',\n      border: active ? '1.5px solid #E6007E' : '1.5px solid #E0E0E6',\n      background: active ? '#E6007E' : '#FFFFFF',\n      color: active ? '#FFFFFF' : '#6B6B73'\n    };\n  }\n\n  numStyle(active) {\n    return {\n      fontFamily: \"'Saira',sans-serif\", fontSize: '17px', fontWeight: 600,\n      width: '46px', height: '46px', flex: 'none', cursor: 'pointer', transition: 'all .12s',\n      border: active ? '1.5px solid #E6007E' : '1.5px solid #E0E0E6',\n      background: active ? '#E6007E' : '#FFFFFF',\n      color: active ? '#FFFFFF' : '#9A9AA2'\n    };\n  }\n\n  scaleRow(key) {\n    const buttons = [1, 2, 3, 4, 5, 6, 7].map(n =>\n      React.createElement('button', {\n        key: n,\n        onClick: () => this.set(key, n),\n        style: this.numStyle(this.state[key] === n)\n      }, String(n))\n    );\n    return React.createElement('div', { style: { display: 'flex', gap: '7px' } }, buttons);\n  }\n\n  download() {\n    const s = this.state;\n    const rows = [\n      ['Field', 'Response'],\n      ['Consent given', s.consent],\n      ['Participant ID', s.id],\n      ['Age', s.age],\n      ['Job / Role', s.job],\n      ['Joining from', s.location],\n      ['Software (if online)', s.location === 'Online' ? s.software : ''],\n      ['Previous XR experience', s.prevXR],\n      ['Affinity with technology (1-7)', s.techAffinity || ''],\n      ['Experience felt immersive and realistic (1-7)', s.q1 || ''],\n      ['It was easy to use and navigate (1-7)', s.q2 || ''],\n      ['Interaction with the controller felt intuitive (1-7)', s.q3 || ''],\n      ['The streaming was smooth and clear, without lag (1-7)', s.q4 || ''],\n      ['I felt more engaged than with traditional methods (1-7)', s.q5 || ''],\n      ['I would like to learn with this tool (1-7)', s.q6 || ''],\n      ['Additional comments', s.comment]\n    ];\n    const csv = rows.map(r => r.map(c => '\"' + String(c).replace(/\"/g, '\"\"') + '\"').join(',')).join('\\r\\n');\n    const blob = new Blob(['\\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = 'xrwise-questionnaire-' + (s.id ? s.id.replace(/[^a-z0-9_-]/gi, '') : 'response') + '.csv';\n    document.body.appendChild(a);\n    a.click();\n    a.remove();\n    URL.revokeObjectURL(url);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const xrLabels = ['None', 'A little', 'Moderate', 'Extensive'];\n    const answered = [s.q1, s.q2, s.q3, s.q4, s.q5, s.q6].filter(Boolean).length;\n\n    const pillRow = (options, key) => React.createElement('div',\n      { style: { display: 'flex', flexWrap: 'wrap', gap: '12px' } },\n      options.map(l => React.createElement('button', {\n        key: l,\n        onClick: () => this.set(key, l),\n        style: this.pillStyle(s[key] === l)\n      }, l))\n    );\n    const xrButtons = pillRow(xrLabels, 'prevXR');\n    const consentButtons = pillRow(['Yes, I consent', 'No'], 'consent');\n    const locationButtons = pillRow(['Berlin', 'Braunschweig', 'Online'], 'location');\n    const softwareButtons = pillRow(['VR app', 'Mac app', 'Windows app'], 'software');\n\n    const downloadButton = React.createElement('button', {\n      onClick: () => this.download(),\n      style: {\n        fontFamily: \"'Saira',sans-serif\", fontWeight: 700, fontSize: '17px', letterSpacing: '1px',\n        color: '#FFFFFF', background: '#E6007E', border: 'none', padding: '18px 38px',\n        cursor: 'pointer', textTransform: 'uppercase', whiteSpace: 'nowrap'\n      }\n    }, 'Download responses');\n\n    return {\n      idVal: s.id, ageVal: s.age, jobVal: s.job, commentVal: s.comment,\n      onId: (e) => this.set('id', e.target.value),\n      onAge: (e) => this.set('age', e.target.value),\n      onJob: (e) => this.set('job', e.target.value),\n      onComment: (e) => this.set('comment', e.target.value),\n      xrButtons,\n      consentButtons,\n      locationButtons,\n      softwareButtons,\n      isOnline: s.location === 'Online',\n      affinityButtons: this.scaleRow('techAffinity'),\n      row1: this.scaleRow('q1'),\n      row2: this.scaleRow('q2'),\n      row3: this.scaleRow('q3'),\n      row4: this.scaleRow('q4'),\n      row5: this.scaleRow('q5'),\n      row6: this.scaleRow('q6'),\n      statusTitle: answered === 6 ? 'All set — ready to download' : (answered + ' of 6 experience questions answered'),\n      downloadButton\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
